name: Workflow 1 - Dependent Jobs

on:
  push:
    branches: [ "master" ]   # add "main" here too if your default branch is main

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Start build
        run: echo "Building application..."
      - name: Simulate build work
        run: sleep 3

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Start tests
        run: echo "Running tests..."
      - name: Simulate test work
        run: sleep 3

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Start deploy
        run: echo "Deploying application..."
      - name: Simulate deploy work
        run: sleep 3
